set -g mouse on
set -g renumber-windows on
unbind %
set -g status-style bg=colour235,fg=colour125
set -s set-clipboard on
# 增加历史记录行数
set -g history-limit 10000
# 从1开始编号（而不是0）
set -g base-index 1
setw -g pane-base-index 1
# 重新加载配置文件
bind r source-file ~/.tmux.conf \; display "Config reloaded!"
# 更直观的分割快捷键
bind | split-window -h  # 垂直分割
bind - split-window -v  # 水平分割
# 快速窗格调整大小
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# 自动重命名窗口（基于当前命令）
setw -g automatic-rename on
# 窗格边框颜色
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour125"
# 允许直接使用前缀键 + PageUp/PageDown 翻页
bind-key PageUp copy-mode -u
bind-key PageDown send-keys -t '{mouse}' PageDown
# 允许 tmux 处理并透传扩展按键
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features ",xterm*:extkeys"
# 更顺手的复制体验
setw -g mode-keys vi
# 键盘复制: Prefix + [ 进入复制模式，v 开始选择，y 复制并退出
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "sh -c 'if [ -n \"$WAYLAND_DISPLAY\" ] && command -v wl-copy >/dev/null 2>&1; then wl-copy; elif [ -n \"$DISPLAY\" ] && command -v xsel >/dev/null 2>&1; then xsel --clipboard --input; elif [ -n \"$DISPLAY\" ] && command -v xclip >/dev/null 2>&1; then xclip -selection clipboard -in; else cat >/dev/null; fi'"
# 只保留鼠标切 pane / 拖边框改大小，禁用 tmux 鼠标复制相关行为
unbind -T root MouseDrag1Pane
unbind -T root WheelUpPane
unbind -T root WheelDownPane
unbind -T root DoubleClick1Pane
unbind -T root TripleClick1Pane
bind-key -T root MouseDown1Pane select-pane -t =
bind-key -T root MouseDrag1Border resize-pane -M
bind-key -T root WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if-shell -F -t = '#{pane_in_mode}' 'send-keys -M' 'copy-mode -e -t =; send-keys -M'"
bind-key -T root WheelDownPane send-keys -M